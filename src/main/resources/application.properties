spring.application.name=Library-management-System
server.port=8080

# Database - PostgreSQL (Neon)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/librarydb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JWT Configuration
jwt.secret.key=${JWT_SECRET_KEY}

# Mail - Use Gmail App Password (not your regular password)
# To generate App Password: Google Account > Security > 2-Step Verification > App passwords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.test-connection=false

# Razorpay
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}
razorpay.callback.base-url=${RAZORPAY_CALLBACK_URL:http://localhost:5173}

# Admin User Configuration
admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}
